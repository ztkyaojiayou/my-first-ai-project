<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 32px;
            text-align: center;
        }
        .tabs {
            display: flex;
            margin-bottom: 32px;
            border-bottom: 1px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: 500;
            cursor: pointer;
            color: #999;
            transition: 0.2s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }
        .message.success { color: #52c41a; }
        .message.error { color: #ff4d4f; }
        .form { display: none; }
        .form.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户管理系统</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="login">登录</div>
            <div class="tab" data-tab="register">注册</div>
        </div>

        <!-- 登录表单 -->
        <form class="form active" id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" required placeholder="请输入密码">
            </div>
            <button type="submit" id="loginBtn">登录</button>
            <div class="message" id="loginMsg"></div>
        </form>

        <!-- 注册表单 -->
        <form class="form" id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" required placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="regNickname" required placeholder="请输入昵称">
            </div>
            <button type="submit" id="registerBtn">注册</button>
            <div class="message" id="registerMsg"></div>
        </form>
    </div>

    <script>
        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tabName + 'Form').classList.add('active');
            });
        });

        // 登录
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('loginMsg');
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const res = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    msg.className = 'message success';
                    msg.textContent = '登录成功！';
                    btn.textContent = '登录成功';
                    setTimeout(() => alert('登录成功！token=' + data.data.token), 300);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.message || '登录失败';
                }
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '网络错误，请检查';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('registerMsg');
            btn.disabled = true;
            btn.textContent = '注册中...';
            try {
                const res = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });
                const data = await res.json();
                if (data.code === 200) {
                    msg.className = 'message success';
                    msg.textContent = '注册成功，请切换到登录页';
                    document.querySelector('[data-tab="login"]').click();
                    document.getElementById('loginUsername').value = username;
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.message || '注册失败';
                }
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '网络错误，请检查';
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
