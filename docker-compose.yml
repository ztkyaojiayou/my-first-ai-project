version: '3.8'

services:
  # Spring Boot 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userdemo-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - userdemo-network

  # nginx 前端服务
  nginx:
    image: nginx:alpine
    container_name: userdemo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - userdemo-network

networks:
  userdemo-network:
    driver: bridge
